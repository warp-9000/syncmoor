name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows MSI + portable EXE
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            bundles: 'msi,nsis'
          # macOS universal (Apple Silicon + Intel)
          - target: universal-apple-darwin
            runner: macos-14
            bundles: 'app,dmg'
          # Linux: AppImage + .deb
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            bundles: 'appimage,deb'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS notarization secrets — optional; if absent we ship unsigned
          # and document the right-click-Open workaround in README.
          APPLE_CERTIFICATE:           ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:  ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:      ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:              ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: 'syncmoor ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

  publish-checksums:
    name: publish SHA-256 sums
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Generate checksums
        run: echo "Checksums are attached by tauri-action; manual SHA-256 publication can land here in a later phase."
